name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore dependencies
        run: dotnet restore image-mcp.sln

      - name: Build
        run: dotnet build image-mcp.sln --no-restore

      - name: Test
        run: dotnet test image-mcp.sln --no-build --verbosity normal
